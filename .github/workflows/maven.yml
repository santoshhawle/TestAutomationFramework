# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Java CI with Maven

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

# Grant minimal permissions to the GITHUB_TOKEN. `security-events: write` is required
# for the dependency-submission action to call the dependency-graph API successfully.
permissions:
  contents: read
  security-events: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    - name: Build with Maven
      run: mvn -B -V clean test --file pom.xml

    # Generate Allure HTML report (from target/allure-results)
    - name: Generate Allure HTML report (from target/allure-results)
      if: always()
      run: |
        echo "Listing target before generation:" && ls -la target || true
        if [ -d target/allure-results ]; then
          echo "Found target/allure-results - installing Allure CLI and generating Allure report into target/allure-report"
          # Install prerequisites and Allure CLI
          sudo apt-get update -y && sudo apt-get install -y unzip wget || true
          ALLURE_VER=2.20.1
          wget https://github.com/allure-framework/allure2/releases/download/${ALLURE_VER}/allure-${ALLURE_VER}.zip -O /tmp/allure.zip
          sudo unzip -o /tmp/allure.zip -d /opt/
          sudo ln -sf /opt/allure-${ALLURE_VER}/bin/allure /usr/bin/allure
          echo "Allure version:" && allure --version || true

          # Run the same command you run locally
          allure generate target/allure-results -o target/allure-report --clean || true

          echo "After generation, listing target/allure-report:"
          ls -la target/allure-report || true
        else
          echo "No target/allure-results directory found; skipping Allure generation."
        fi

    # Upload only the generated Allure HTML report as the single artifact
    - name: Upload Allure HTML report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-report
        path: target/allure-report

  sonar:
    name: SonarQube Scan
    needs: test
    runs-on: ubuntu-latest
    # Only run the Sonar job if a SONAR_TOKEN secret is configured
    if: ${{ secrets.SONAR_TOKEN != '' }}

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: maven

    - name: Run SonarQube analysis
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: |
        echo "Running SonarQube analysis (skip tests)"
        # Customize with -Dsonar.host.url or -Dsonar.organization if needed for SonarCloud
        mvn -B -DskipTests sonar:sonar -Dsonar.login=${SONAR_TOKEN}
