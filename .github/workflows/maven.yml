# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Java CI with Maven

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

# Grant minimal permissions to the GITHUB_TOKEN. `security-events: write` is required
# for the dependency-submission action to call the dependency-graph API successfully.
permissions:
  contents: read
  security-events: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    - name: Build with Maven
      run: mvn -B -V clean test --file pom.xml

    # Generate Allure HTML report from results in target/results (if present)
    - name: Generate Allure HTML report (from target/results)
      if: always()
      run: |
        echo "Listing target before generation:" && ls -la target || true
        if [ -d target/allure-results ]; then
          echo "Found target/allure-results - generating Allure report into target/allure-report"
          mvn io.qameta.allure:allure-maven:2.14.0:report -Dallure.results.directory=target/results -Dallure.report.directory=target/allure-report || true
          echo "After generation, listing target/allure-report:"
          ls -la target/allure-report || true
        else
          echo "No target/results directory found; skipping Allure generation."
        fi

    # Upload only the generated Allure HTML report as the single artifact
    - name: Upload Allure HTML report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-report
        path: target/allure-report
