# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Java CI with Maven

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

# Grant minimal permissions to the GITHUB_TOKEN. `security-events: write` is required
# for the dependency-submission action to call the dependency-graph API successfully.
permissions:
  contents: read
  security-events: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    - name: Build with Maven
      run: mvn -B -V clean test --file pom.xml

    # Upload common test artifacts so you can download and inspect reports from the Actions run
    - name: Archive Surefire / Failsafe reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: surefire-reports
        path: |
          target/surefire-reports
          target/failsafe-reports

    - name: Upload Allure results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-results
        path: target/allure-results

    - name: Upload Allure HTML report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-report
        path: target/allure-report

    - name: Upload HTML test-output
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: html-test-output
        path: test-output/HtmlReport
